name: release
# Fires only when a version tag is pushed — cutting a release is deliberate:
#   git tag v0.1.0 && git push origin v0.1.0
# GoReleaser cross-builds `still` and attaches archives + checksums to a DRAFT
# GitHub Release (review, then publish).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Guard — tests must pass before a release
        run: go test ./...
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Always defined so the formula template resolves; empty means the
          # Homebrew step skips itself rather than failing the release.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
