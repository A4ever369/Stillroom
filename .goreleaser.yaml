# GoReleaser builds the `still` binary for every supported platform and
# attaches the archives + checksums to a GitHub Release. It runs only when a
# tag is pushed (see .github/workflows/release.yml) — cutting a release is a
# deliberate `git tag` away, never automatic.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: still
    main: ./cmd/still
    binary: still
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

  # The self-hostable server ships alongside the CLI so a team can run the
  # org-wide index without building from source.
  - id: stillroomd
    main: ./cmd/stillroomd
    binary: stillroomd
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: still
    ids: [still]
    # install.sh fetches still_<version>_<os>_<arch>.<ext>. The default template
    # uses ProjectName ("Stillroom"), which would 404 every install.
    name_template: "still_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

  - id: stillroomd
    ids: [stillroomd]
    name_template: "stillroomd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - docs/self-hosting.md

# The landing page tells people `brew install` is an option, so it has to be
# real. GoReleaser writes the cask into a tap repo on every tag; the tap repo
# (A4ever369/homebrew-tap) must exist and HOMEBREW_TAP_TOKEN must be set in the
# release workflow, or this step skips itself.
#
# Casks rather than formulae: Homebrew now wants pre-built binaries distributed
# as casks, and `brews:` is deprecated.
homebrew_casks:
  - name: still
    ids: [still]
    repository:
      owner: A4ever369
      name: homebrew-tap
      token: '{{ index .Env "HOMEBREW_TAP_TOKEN" }}'
    # Never fail a release because the tap is unreachable or unconfigured: the
    # binaries are the release, the cask is a convenience.
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_TOKEN" }}false{{ else }}true{{ end }}'
    homepage: https://stillroom.sh
    description: Distill your AI coding sessions into team knowledge, and hand it to someone as a link.
    license: Apache-2.0
    # The binaries are not Apple-notarized, so macOS would quarantine them and
    # refuse to run. Strip the attribute the same way Homebrew does for other
    # unsigned tools, rather than leaving people with a binary that dies on
    # first launch.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/still"]
          end

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: true # review the generated release before publishing
