# GoReleaser builds the `still` binary for every supported platform and
# attaches the archives + checksums to a GitHub Release. It runs only when a
# tag is pushed (see .github/workflows/release.yml) — cutting a release is a
# deliberate `git tag` away, never automatic.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: still
    main: ./cmd/still
    binary: still
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

  # The self-hostable server ships alongside the CLI so a team can run the
  # org-wide index without building from source.
  - id: stillroomd
    main: ./cmd/stillroomd
    binary: stillroomd
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: still
    ids: [still]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

  - id: stillroomd
    ids: [stillroomd]
    name_template: "stillroomd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - docs/self-hosting.md

# The landing page tells people to `brew install`, so that has to be real.
# GoReleaser writes the formula into a tap repo on every tag; the tap repo
# (A4ever369/homebrew-tap) must exist and HOMEBREW_TAP_TOKEN must be set in
# the release workflow, or this step is skipped with a warning.
brews:
  - name: still
    ids: [still]
    repository:
      owner: A4ever369
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      # Never fail a release because the tap is unreachable: the binaries are
      # the release, the formula is a convenience.
      skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"
    homepage: https://github.com/A4ever369/Stillroom
    description: Distill your AI coding sessions into team knowledge, and hand it to someone as a link.
    license: Apache-2.0
    test: |
      system "#{bin}/still", "version"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: true # review the generated release before publishing
